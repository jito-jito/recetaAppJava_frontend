# Aplicación RecetaApp - Frontend
spring.application.name=receta-frontend

# Configuración del Servidor
server.port=8081

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true

# Configuración de logging
logging.level.com.duoc.seguridadcalidad=INFO
logging.level.org.springframework.web=INFO

# Configuración HTTP Client
http.client.timeout=30000

# URL del Backend API
backend.url=http://localhost:8080

# **MITIGACIÓN: Session Management & Cookie Security**
# Configuración segura de sesiones y cookies
server.servlet.session.timeout=30m
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.max-age=1800

# **MITIGACIÓN: Server Security Headers**
# Headers adicionales de seguridad del servidor
server.server-header=
server.error.include-stacktrace=never
server.error.include-exception=false

# **MITIGACIÓN: Spring Security Configuration**
# Configuraciones adicionales de Spring Security
spring.security.headers.content-security-policy=default-src 'self'
spring.security.headers.frame=deny

# Configuración de subida de archivos (Multipart)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
