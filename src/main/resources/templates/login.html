<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>RecetaApp - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" th:href="@{/login.css}">
    <!-- MITIGACIÓN: Sub Resource Integrity Attribute Missing -->
    <!-- Agregado SRI y crossorigin para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" 
          rel="stylesheet" 
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>🍳 RecetaApp</h1>
                <p>Accede a tu cuenta</p>
            </div>

            <div class="login-form-container">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="button" class="login-btn" id="loginBtn">
                    Iniciar Sesión
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript externalizado para cumplir CSP sin unsafe-inline -->
    <script th:src="@{/login.js}"></script>
</body>
</html>
